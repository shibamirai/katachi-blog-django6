services:
  - type: web
    plan: free
    name: katachi-blog-django6
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn katachi-blog-django6.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
