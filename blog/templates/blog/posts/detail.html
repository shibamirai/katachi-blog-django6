{% load static %}

<c-layouts.base>
    <article class="max-w-6xl mx-auto md:grid md:grid-cols-12 my-10 px-4 gap-x-10">
        <div class="col-span-5">
            <div class="hidden md:flex justify-between">
                <a href="{% url 'home' %}" class="flex items-center transition-colors duration-300 hover:text-blue-500">
                    <c-icons.arrow /> 一覧へ戻る
                </a>
            </div>

            <img class="rounded-lg my-4"
                {% if post.thumbnail %}
                    src="{{ MEDIA_URL }}{{ post.thumbnail }}"
                {% else %}
                    src="{% static 'logo.png' %}"
                {% endif %}
                alt="{{ post.title }}"
            >

            <div class="flex items-center justify-between">
                <a href="{% url 'home' %}{% querystring category=post.category_id %}"
                    class="badge not-hover:badge-outline badge-info text-sm"
                >
                    {{ post.category.name }}
                </a>
                <span class="block text-base-content/70 text-sm">
                    <time>{{ post.posted_at }}</time>
                </span>
            </div>
        </div>

        <div class="col-span-7">
            <h2 class="text-3xl font-bold">
                {{ post.title }}
            </h2>

            <p class="text-right font-bold mt-2">
                <a href="{% url 'home' %}{% querystring author=post.author.id %}">
                    {{ post.author.name }}
                </a>
            </p>

            <p class="leading-loose mt-8">
                {{ post.body|linebreaksbr }}
            </p>

            <section class="mt-10 bg-base-100 border border-base-300 rounded-sm p-4 space-y-4">
                <h2 class="font-bold text-lg">コメント</h2>
                {% for comment in post.comment_set.all %}
                    <c-blog.posts.comment :comment=comment />
                {% empty %}
                    <p>コメントはありません。</p>
                {% endfor %}
            </section>
        </div>
    </article>
</c-layouts.base>
