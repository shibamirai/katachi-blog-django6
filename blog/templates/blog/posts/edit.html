<c-layouts.base>
    <section class="max-w-2xl mx-auto my-10 bg-base-100 border border-base-300 p-6 rounded-xl">
        <div class="hidden md:flex justify-between">
            <a href="{% url 'mylist' %}"
                class="flex items-center text-sm hover:text-info"
            >
                <c-icons.arrow /> 投稿記事一覧へ戻る
            </a>
        </div>
        <h1 class="text-center font-bold text-xl">
            記事の更新
        </h1>

        <form method="POST" enctype="multipart/form-data"
            class="mt-6 grid gap-y-6"
        >
            {% csrf_token %}
            {{ form }}
            <button class="btn btn-block btn-primary">更新</button>
        </form>
    </section>
</c-layouts.base>
