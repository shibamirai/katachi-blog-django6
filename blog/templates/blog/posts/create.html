<c-layouts.base>
    <section class="max-w-2xl mx-auto my-10 bg-base-100 border border-base-300 p-6 rounded-xl">
        <h1 class="text-center font-bold text-xl">
            お知らせ投稿
        </h1>

        <form method="POST" enctype="multipart/form-data"
            class="mt-6 grid gap-y-6"
        >
            {% csrf_token %}
            {{ form }}
            <button class="btn btn-block btn-primary">投稿</button>
        </form>
    </section>
</c-layouts.base>
